server:
  host: "0.0.0.0"
  port: 8000

# Client-side semantic execution settings. These are not consumed by the
# hardware server.
action_backend:
  server_url: "http://192.168.1.15:8000"
  arm: "left"
  camera_name: "Gemini335"
  approach_distance_m: 0.06
  home_speed_ratio: 0.5
  home_max_step_deg: 45.0
  approach_speed_ratio: 0.5
  grasp_speed_ratio: 0.3
  retreat_speed_ratio: 0.3
  place_approach_speed_ratio: 0.5
  place_speed_ratio: 0.3
  # Signed world-X offset: pre-place.x = place.x + offset.
  place_approach_offset_x_m: -0.05
  # Fixed X5 TCP orientation for all place actions.
  default_place_orientation_rotvec: [1.2172784, 1.2123690, 1.2159012]
  request_timeout_s: 90.0

# Real Orbbec camera + real X5 controller for Server PC deployment.
camera:
  backend: "orbbec"
  which_cam: "Orbbec"
  width: 1280
  height: 720
  fps: 30
  timeout_ms: 1000
  max_capture_attempts: 30
  max_sync_delta_ms: 20.0

robot:
  backend: "x5"
  arms: ["left"]
  mode: 100
  remote: false
  enable_servo_on_start: true
  stop_on_shutdown: false
  max_command_speed_ratio: 0.5
  max_joint_delta_deg: 45.0
  move_timeout_ms: 60000
  gripper-left:
    enabled: true
    port: "COM6"
    baudrate: 115200
    gripper_id: 1
    force: 100
    closed_position: 0
    open_position: 1000
    init_timeout_s: 10.0
    move_timeout_s: 5.0
    poll_interval_s: 0.1
  gripper-right:
    enabled: true
    port: "COM13"
    baudrate: 115200
    gripper_id: 1
    force: 100
    closed_position: 0
    open_position: 1000
    init_timeout_s: 10.0
    move_timeout_s: 5.0
    poll_interval_s: 0.1
  joint_limits_deg:
    - [-170.0, 170.0]
    - [-30.0, 90.0]
    - [-155.0, 155.0]
    - [-30.0, 120.0]
    - [-168.0, 168.0]
    - [-30.0, 100.0]
    - [-170.0, 170.0]
  left:
    robot_ip: "192.168.1.7"
    tool_frame:
      tf_no: 1
      position_m: [0.0, 0.0, 0.17]
      rpy_deg: [0.0, 0.0, 0.0]
    home_joints_deg: [-24, 10, -53, 102, 101, 80, -18] # gripper facing down
    # check_gripper_joints_deg: [-15, 24, -64, 89, 44, 74, -2] # robot checks the gripper position
    check_gripper_joints_deg: [-64, 37, -16, 95, 108, 86, -40]
    head_joints_deg: [0, 28]
    # home_joints_deg: [-49, 55, -18, 90, 0, 100, -18] # calibration home pose
    # head_joints_deg: [0, 28]
  right:
    robot_ip: "192.168.1.8"
    tool_frame:
      tf_no: 0
      position_m: [0.0, 0.0, 0.0]
      rpy_deg: [0.0, 0.0, 0.0]
    home_joints_deg: [74, 32, 0, 99, -100, 77, 46] # gripper facing down
    pre_grasp_joints_deg: [75, 70, 0, 70, -99, 84, 146] # right hand approch pose for bin
    grasp_joints_deg: [65, 74, 0, 59, -105, 76, 141] # right hand grasp pose for bin
    pour_joints_deg: [75, 75, 0, 67, -111, 100, 149] # right hand pour pose for bin
    home_torso_deg: [0, 0] # right hand don't have E3, may need to check avalability
    pour_torso_deg: [15, 0]
    